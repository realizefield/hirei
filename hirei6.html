<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>数学：⑥演習１　グラフから式を求めよ</title>
    <style>
        :root { --primary-color: #1a5276; --bg-color: #f8f9fa; --drop-zone-bg: #fff9c4; --line-green: #06C755; }
        body { font-family: sans-serif; background-color: var(--bg-color); margin: 0; padding: 0 16px; overflow-x: hidden; box-sizing: border-box; }

        .sticky-header { position: sticky; top: 0; background: var(--bg-color); padding: 10px 16px; z-index: 1000; border-bottom: 2px solid #ddd; box-sizing: border-box; }
        
                .page-nav { max-width: 900px; margin: 0 auto 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .nav-btn { text-decoration: none; background: #7f8c8d; color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: bold; transition: 0.2s; white-space: nowrap; }
        .nav-btn:hover { background: #34495e; }
        .nav-btn.index-btn { background: #1a5276; padding: 6px 18px; }
        .nav-btn.index-btn:hover { background: #154360; }
        .nav-btn.disabled { background: #ccc; pointer-events: none; color: #999; }

        .challenge-panel { background: #eaf0fb; border: 1.5px solid #aed6f1; color: #1a5276; padding: 10px 20px; border-radius: 8px; display: flex; justify-content: space-around; align-items: center; max-width: 900px; margin: 0 auto 10px; }
        .timer { font-size: 1.5em; color: #1a5276; font-family: monospace; font-weight: bold; }

        .audio-summary-area { background: #fff3e0; padding: 12px 16px; border-radius: 8px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: space-between; border: 1px solid #ffe0b2; max-width: 900px; }
        .speaker-btn-large { background: #e67e22; color: white; border: none; cursor: pointer; padding: 10px 25px; border-radius: 30px; font-weight: bold; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .speaker-btn-large.playing { background: #c0392b; }
        .volume-control { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { cursor: pointer; width: 150px; }

        .word-bank-container { background: #eee; padding: 12px 16px; border-radius: 8px; border: 1px solid #ccc; max-width: 900px; margin: 0 auto; }
        .word-bank { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }
        .drag-item { background: #fff; color: #c0392b; border: 1px solid #333; padding: 4px 14px; cursor: pointer; font-weight: bold; font-size: 0.95em; border-radius: 3px; font-style: italic; }
        .drag-item.selected { background: #f1c40f; color: #333; box-shadow: 0 0 0 3px #e67e22; transform: scale(1.08); }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        .word-bank-container.shake { animation: shake 0.4s ease; }

        .container { max-width: 900px; margin: 20px auto; background: white; padding: 24px; border-radius: 12px; box-sizing: border-box; }

        /* 指示文 */
        .instruction { font-size: 15px; font-weight: bold; color: #1a5276; margin-bottom: 20px; padding: 12px 16px; background: #eaf0fb; border-left: 5px solid #2980b9; border-radius: 6px; }

        /* 問題グリッド：2列 */
        .q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width: 640px){ .q-grid { grid-template-columns: 1fr; } }

        /* カード */
        .q-card { border: 1.5px solid #dde; border-radius: 10px; padding: 16px; background: #fafafa; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
        .q-title { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 1em; margin-bottom: 12px; color: #1a5276; }
        .badge { color: white; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; flex-shrink: 0; background: #1a5276; }

        /* グラフ */
        .graph-wrap { background: white; border: 1.5px solid #ccc; border-radius: 6px; padding: 6px; text-align: center; margin-bottom: 12px; }

        /* 答え欄 */
        .ans-row { display: flex; align-items: center; gap: 8px; font-size: 15px; font-style: italic; flex-wrap: wrap; }
        .ans-label { font-weight: bold; color: #555; font-style: normal; }

        .drop-zone-inline {
            display: inline-block; min-width: 90px; height: 1.9em;
            background: var(--drop-zone-bg); border: 1.5px solid #aaa;
            vertical-align: middle; cursor: pointer; text-align: center;
            font-weight: bold; color: #c0392b; padding: 2px 8px;
            border-radius: 3px; font-size: 14px; font-style: italic;
            transition: background 0.15s;
        }
        .drop-zone-inline:hover { border-color: #e67e22; background: #fff3cd; }
        .drop-zone-inline.correct { background: #d4edda !important; border: 2px solid #28a745 !important; color: #155724 !important; font-style: italic; }
        .drop-zone-inline.wrong   { background: #f8d7da !important; border: 2px solid #dc3545 !important; }

        /* コントロール */
        .controls { text-align: center; margin-top: 30px; padding-bottom: 100px; }
        .main-btn { padding: 15px 30px; font-size: 1.1rem; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; color: white; margin: 0 8px; }

        .line-float-btn { position: fixed; bottom: 30px; right: 30px; background: var(--line-green); color: white; width: 75px; height: 75px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-decoration: none; font-weight: bold; font-size: 11px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 2000; transition: 0.2s; }
        .line-float-btn:hover { transform: scale(1.1); }

        /* 分数表示 */
        .frac-wrap { display: inline-flex; align-items: center; gap: 2px; vertical-align: middle; pointer-events: none; }
        .frac { display: inline-flex; flex-direction: column; align-items: center; font-size: 0.82em; line-height: 1.1; }
        .frac .num { border-bottom: 1.5px solid currentColor; padding: 0 2px; font-weight: bold; }
        .frac .den { padding: 0 2px; font-weight: bold; }
        .frac-x { font-style: italic; font-weight: bold; font-size: 1em; }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>

<div class="container">

    <div class="instruction">グラフをみて，x と y の関係式を求めよ。</div>

    <div class="q-grid">

        <!-- 問(1) y = 1/2 x -->
        <div class="q-card">
            <div class="q-title"><span class="badge">1</span>（1）</div>
            <div class="graph-wrap">
                <svg width="200" height="200" viewBox="-70 -70 140 140">
                    <g stroke="#e0e0e0" stroke-width="0.6">
                        <line x1="-60" y1="-60" x2="-60" y2="60"/><line x1="-40" y1="-60" x2="-40" y2="60"/>
                        <line x1="-20" y1="-60" x2="-20" y2="60"/><line x1="20" y1="-60" x2="20" y2="60"/>
                        <line x1="40" y1="-60" x2="40" y2="60"/><line x1="60" y1="-60" x2="60" y2="60"/>
                        <line x1="-60" y1="-60" x2="60" y2="-60"/><line x1="-60" y1="-40" x2="60" y2="-40"/>
                        <line x1="-60" y1="-20" x2="60" y2="-20"/><line x1="-60" y1="20" x2="60" y2="20"/>
                        <line x1="-60" y1="40" x2="60" y2="40"/><line x1="-60" y1="60" x2="60" y2="60"/>
                    </g>
                    <line x1="-65" y1="0" x2="65" y2="0" stroke="#333" stroke-width="1.5"/>
                    <polygon points="65,0 59,-3 59,3" fill="#333"/>
                    <line x1="0" y1="65" x2="0" y2="-65" stroke="#333" stroke-width="1.5"/>
                    <polygon points="0,-65 -3,-59 3,-59" fill="#333"/>
                    <text x="60" y="11" font-size="9" fill="#333" font-style="italic">x</text>
                    <text x="3" y="-57" font-size="9" fill="#333" font-style="italic">y</text>
                    <text x="3" y="11" font-size="8" fill="#888">O</text>
                    <g font-size="7" fill="#aaa" text-anchor="middle">
                        <text x="-40" y="9">-2</text><text x="-20" y="9">-1</text>
                        <text x="20" y="9">1</text><text x="40" y="9">2</text>
                    </g>
                    <g font-size="7" fill="#aaa" text-anchor="end">
                        <text x="-3" y="-37">2</text><text x="-3" y="-17">1</text>
                        <text x="-3" y="21">-1</text><text x="-3" y="41">-2</text>
                    </g>
                    <!-- y=1/2 x: (-4,-2)→(4,2) = px右上がり -->
                    <line x1="-60" y1="30" x2="60" y2="-30" stroke="#e74c3c" stroke-width="2" stroke-linecap="round"/>
                    <!-- 傾き矢印: 右2→上1 -->
                    <line x1="0" y1="0" x2="40" y2="0" stroke="#2980b9" stroke-width="1.5" marker-end="url(#b1)"/>
                    <line x1="40" y1="0" x2="40" y2="-20" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#r1)"/>
                    <defs>
                        <marker id="b1" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2980b9"/></marker>
                        <marker id="r1" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#e74c3c"/></marker>
                    </defs>
                    <text x="14" y="-2" font-size="7" fill="#2980b9" font-weight="bold">①+2</text>
                    <text x="42" y="-8" font-size="7" fill="#e74c3c" font-weight="bold">②+1</text>
                </svg>
            </div>
            <div class="ans-row">
                <span class="ans-label">y =</span>
                <span class="drop-zone-inline" data-ans="1/2 x" onclick="zCl(this)"></span>
            </div>
        </div>

        <!-- 問(2) y = 3x -->
        <div class="q-card">
            <div class="q-title"><span class="badge">2</span>（2）</div>
            <div class="graph-wrap">
                <svg width="200" height="200" viewBox="-70 -70 140 140">
                    <g stroke="#e0e0e0" stroke-width="0.6">
                        <line x1="-60" y1="-60" x2="-60" y2="60"/><line x1="-40" y1="-60" x2="-40" y2="60"/>
                        <line x1="-20" y1="-60" x2="-20" y2="60"/><line x1="20" y1="-60" x2="20" y2="60"/>
                        <line x1="40" y1="-60" x2="40" y2="60"/><line x1="60" y1="-60" x2="60" y2="60"/>
                        <line x1="-60" y1="-60" x2="60" y2="-60"/><line x1="-60" y1="-40" x2="60" y2="-40"/>
                        <line x1="-60" y1="-20" x2="60" y2="-20"/><line x1="-60" y1="20" x2="60" y2="20"/>
                        <line x1="-60" y1="40" x2="60" y2="40"/><line x1="-60" y1="60" x2="60" y2="60"/>
                    </g>
                    <line x1="-65" y1="0" x2="65" y2="0" stroke="#333" stroke-width="1.5"/>
                    <polygon points="65,0 59,-3 59,3" fill="#333"/>
                    <line x1="0" y1="65" x2="0" y2="-65" stroke="#333" stroke-width="1.5"/>
                    <polygon points="0,-65 -3,-59 3,-59" fill="#333"/>
                    <text x="60" y="11" font-size="9" fill="#333" font-style="italic">x</text>
                    <text x="3" y="-57" font-size="9" fill="#333" font-style="italic">y</text>
                    <text x="3" y="11" font-size="8" fill="#888">O</text>
                    <g font-size="7" fill="#aaa" text-anchor="middle">
                        <text x="-40" y="9">-2</text><text x="-20" y="9">-1</text>
                        <text x="20" y="9">1</text><text x="40" y="9">2</text>
                    </g>
                    <g font-size="7" fill="#aaa" text-anchor="end">
                        <text x="-3" y="-37">2</text><text x="-3" y="-17">1</text>
                        <text x="-3" y="21">-1</text><text x="-3" y="41">-2</text>
                    </g>
                    <!-- y=3x: (-1,-3)→(1,3) = px(-20,60)→(20,-60) -->
                    <line x1="-20" y1="60" x2="20" y2="-60" stroke="#2980b9" stroke-width="2" stroke-linecap="round"/>
                    <!-- 傾き矢印: 右1→上3 -->
                    <line x1="0" y1="0" x2="20" y2="0" stroke="#2980b9" stroke-width="1.5" marker-end="url(#b2)"/>
                    <line x1="20" y1="0" x2="20" y2="-60" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#r2)"/>
                    <defs>
                        <marker id="b2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2980b9"/></marker>
                        <marker id="r2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#e74c3c"/></marker>
                    </defs>
                    <text x="4" y="-3" font-size="7" fill="#2980b9" font-weight="bold">①+1</text>
                    <text x="22" y="-28" font-size="7" fill="#e74c3c" font-weight="bold">②+3</text>
                </svg>
            </div>
            <div class="ans-row">
                <span class="ans-label">y =</span>
                <span class="drop-zone-inline" data-ans="3x" onclick="zCl(this)"></span>
            </div>
        </div>

        <!-- 問(3) y = x -->
        <div class="q-card">
            <div class="q-title"><span class="badge">3</span>（3）　※ y = 1x とは書かない</div>
            <div class="graph-wrap">
                <svg width="200" height="200" viewBox="-70 -70 140 140">
                    <g stroke="#e0e0e0" stroke-width="0.6">
                        <line x1="-60" y1="-60" x2="-60" y2="60"/><line x1="-40" y1="-60" x2="-40" y2="60"/>
                        <line x1="-20" y1="-60" x2="-20" y2="60"/><line x1="20" y1="-60" x2="20" y2="60"/>
                        <line x1="40" y1="-60" x2="40" y2="60"/><line x1="60" y1="-60" x2="60" y2="60"/>
                        <line x1="-60" y1="-60" x2="60" y2="-60"/><line x1="-60" y1="-40" x2="60" y2="-40"/>
                        <line x1="-60" y1="-20" x2="60" y2="-20"/><line x1="-60" y1="20" x2="60" y2="20"/>
                        <line x1="-60" y1="40" x2="60" y2="40"/><line x1="-60" y1="60" x2="60" y2="60"/>
                    </g>
                    <line x1="-65" y1="0" x2="65" y2="0" stroke="#333" stroke-width="1.5"/>
                    <polygon points="65,0 59,-3 59,3" fill="#333"/>
                    <line x1="0" y1="65" x2="0" y2="-65" stroke="#333" stroke-width="1.5"/>
                    <polygon points="0,-65 -3,-59 3,-59" fill="#333"/>
                    <text x="60" y="11" font-size="9" fill="#333" font-style="italic">x</text>
                    <text x="3" y="-57" font-size="9" fill="#333" font-style="italic">y</text>
                    <text x="3" y="11" font-size="8" fill="#888">O</text>
                    <g font-size="7" fill="#aaa" text-anchor="middle">
                        <text x="-40" y="9">-2</text><text x="-20" y="9">-1</text>
                        <text x="20" y="9">1</text><text x="40" y="9">2</text>
                    </g>
                    <g font-size="7" fill="#aaa" text-anchor="end">
                        <text x="-3" y="-37">2</text><text x="-3" y="-17">1</text>
                        <text x="-3" y="21">-1</text><text x="-3" y="41">-2</text>
                    </g>
                    <!-- y=x: (-3,-3)→(3,3) = px(-60,60)→(60,-60) -->
                    <line x1="-62" y1="62" x2="62" y2="-62" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
                    <!-- 傾き矢印: 右1→上1 -->
                    <line x1="0" y1="0" x2="20" y2="0" stroke="#2980b9" stroke-width="1.5" marker-end="url(#b3)"/>
                    <line x1="20" y1="0" x2="20" y2="-20" stroke="#27ae60" stroke-width="1.5" marker-end="url(#g3)"/>
                    <defs>
                        <marker id="b3" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2980b9"/></marker>
                        <marker id="g3" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#27ae60"/></marker>
                    </defs>
                    <text x="4" y="-3" font-size="7" fill="#2980b9" font-weight="bold">①+1</text>
                    <text x="22" y="-8" font-size="7" fill="#27ae60" font-weight="bold">②+1</text>
                </svg>
            </div>
            <div class="ans-row">
                <span class="ans-label">y =</span>
                <span class="drop-zone-inline" data-ans="x" onclick="zCl(this)"></span>
            </div>
        </div>

        <!-- 問(4) y = -1/2 x -->
        <div class="q-card">
            <div class="q-title"><span class="badge">4</span>（4）</div>
            <div class="graph-wrap">
                <svg width="200" height="200" viewBox="-70 -70 140 140">
                    <g stroke="#e0e0e0" stroke-width="0.6">
                        <line x1="-60" y1="-60" x2="-60" y2="60"/><line x1="-40" y1="-60" x2="-40" y2="60"/>
                        <line x1="-20" y1="-60" x2="-20" y2="60"/><line x1="20" y1="-60" x2="20" y2="60"/>
                        <line x1="40" y1="-60" x2="40" y2="60"/><line x1="60" y1="-60" x2="60" y2="60"/>
                        <line x1="-60" y1="-60" x2="60" y2="-60"/><line x1="-60" y1="-40" x2="60" y2="-40"/>
                        <line x1="-60" y1="-20" x2="60" y2="-20"/><line x1="-60" y1="20" x2="60" y2="20"/>
                        <line x1="-60" y1="40" x2="60" y2="40"/><line x1="-60" y1="60" x2="60" y2="60"/>
                    </g>
                    <line x1="-65" y1="0" x2="65" y2="0" stroke="#333" stroke-width="1.5"/>
                    <polygon points="65,0 59,-3 59,3" fill="#333"/>
                    <line x1="0" y1="65" x2="0" y2="-65" stroke="#333" stroke-width="1.5"/>
                    <polygon points="0,-65 -3,-59 3,-59" fill="#333"/>
                    <text x="60" y="11" font-size="9" fill="#333" font-style="italic">x</text>
                    <text x="3" y="-57" font-size="9" fill="#333" font-style="italic">y</text>
                    <text x="3" y="11" font-size="8" fill="#888">O</text>
                    <g font-size="7" fill="#aaa" text-anchor="middle">
                        <text x="-40" y="9">-2</text><text x="-20" y="9">-1</text>
                        <text x="20" y="9">1</text><text x="40" y="9">2</text>
                    </g>
                    <g font-size="7" fill="#aaa" text-anchor="end">
                        <text x="-3" y="-37">2</text><text x="-3" y="-17">1</text>
                        <text x="-3" y="21">-1</text><text x="-3" y="41">-2</text>
                    </g>
                    <!-- y=-1/2 x: 右下がり -->
                    <line x1="-60" y1="-30" x2="60" y2="30" stroke="#8e44ad" stroke-width="2" stroke-linecap="round"/>
                    <!-- 傾き矢印: 右2→下1 -->
                    <line x1="0" y1="0" x2="40" y2="0" stroke="#2980b9" stroke-width="1.5" marker-end="url(#b4)"/>
                    <line x1="40" y1="0" x2="40" y2="20" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#p4)"/>
                    <defs>
                        <marker id="b4" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#2980b9"/></marker>

                    <text x="14" y="-2" font-size="7" fill="#2980b9" font-weight="bold">①+2</text>
                    <text x="42" y="14" font-size="7" fill="#8e44ad" font-weight="bold">②−1</text>
                </svg>
            </div>
            <div class="ans-row">
                <span class="ans-label">y =</span>
                <span class="drop-zone-inline" data-ans="-1/2 x" onclick="zCl(this)"></span>
            </div>
        </div>

        <!-- 問(5) y = -2/3 x -->

<audio id="mainAudio" src="hirei6.wav"></audio>

<script>
    // 分数HTML生成（SVGタグ・テンプレートリテラル不使用）
    var FRAC_ANS = {
        '1/2 x':  ['', '1', '2'],
        '-1/2 x': ['-', '1', '2'],
        '-2/3 x': ['-', '2', '3']
    };

    function makeFracEl(val) {
        var f = FRAC_ANS[val];
        if (!f) return null;
        var wrap = document.createElement('span');
        wrap.className = 'frac-wrap';
        wrap.style.pointerEvents = 'none';
        if (f[0]) {
            var sg = document.createElement('span');
            sg.style.fontWeight = 'bold';
            sg.innerText = f[0];
            wrap.appendChild(sg);
        }
        var frac = document.createElement('span');
        frac.className = 'frac';
        var nc = (f[0] === '-') ? '#e74c3c' : '#1a5276';
        frac.style.color = nc;
        var num = document.createElement('span');
        num.className = 'num';
        num.innerText = f[1];
        var den = document.createElement('span');
        den.className = 'den';
        den.style.color = '#27ae60';
        den.innerText = f[2];
        frac.appendChild(num);
        frac.appendChild(den);
        var xsp = document.createElement('span');
        xsp.className = 'frac-x';
        xsp.style.color = '#1a5276';
        xsp.innerText = 'x';
        wrap.appendChild(frac);
        wrap.appendChild(xsp);
        return wrap;
    }

    function setZone(z, val) {
        z.innerHTML = '';
        var el = makeFracEl(val);
        if (el) {
            z.appendChild(el);
        } else {
            z.innerText = val;
        }
        z.setAttribute('data-filled', val);
    }

    function getZoneVal(z) {
        return z.getAttribute('data-filled') || z.innerText.trim();
    }

    function clearZoneEl(z) {
        z.innerHTML = '';
        z.removeAttribute('data-filled');
        z.classList.remove('correct', 'wrong');
    }

    var sT, tI, isR = false, sW = null, bestTime = null;
    var audio = document.getElementById('mainAudio');
    var volSlider = document.getElementById('volSlider');
    var volNum = document.getElementById('volNum');
    var playBtn = document.getElementById('playBtn');

    function toggleAudio() {
        if (audio.paused) { audio.play(); updatePlayUI(true); } else { audio.pause(); updatePlayUI(false); }
    }
    audio.onended = function() { updatePlayUI(false); };
    function updatePlayUI(p) {
        document.getElementById('btnIcon').innerText = p ? "⏸" : "📢";
        document.getElementById('btnText').innerText = p ? "停止中" : "解説を聴く";
        playBtn.classList.toggle('playing', p);
    }
    volSlider.addEventListener('input', function(e) {
        audio.volume = e.target.value;
        volNum.innerText = Math.round(e.target.value * 100) + "%";
    });

    function fmtTime(ms) {
        var total = ms / 1000;
        var m = Math.floor(total / 60).toString().padStart(2, '0');
        var s = (total % 60).toFixed(1).padStart(4, '0');
        return m + ':' + s;
    }

    function addToBank(word) {
        var b = document.getElementById('wordBank');
        var d = document.createElement('div');
        d.className = 'drag-item';
        d.setAttribute('data-val', word);
        var el = makeFracEl(word);
        if (el) {
            d.appendChild(el);
            d.style.padding = '4px 10px';
            d.style.lineHeight = '1';
            d.style.minHeight = '2.2em';
            d.style.display = 'inline-flex';
            d.style.alignItems = 'center';
        } else {
            d.innerText = word;
        }
        d.onclick = function() {
            if (sW) sW.classList.remove('selected');
            if (sW === this) { sW = null; return; }
            sW = this;
            this.classList.add('selected');
        };
        b.appendChild(d);
    }

    function zCl(z) {
        if (!isR) return;
        var cur = getZoneVal(z);
        if (cur !== '') {
            addToBank(cur);
            clearZoneEl(z);
            return;
        }
        if (sW) {
            var val = sW.getAttribute('data-val') || sW.innerText;
            setZone(z, val);
            sW.remove();
            sW = null;
        }
    }

    function stCh() {
        isR = true; sW = null;
        sT = Date.now(); clearInterval(tI);
        tI = setInterval(function() {
            document.getElementById('timerDisplay').innerText = fmtTime(Date.now() - sT);
        }, 100);
        var zones = document.querySelectorAll('.drop-zone-inline');
        var allAns = [];
        zones.forEach(function(z) {
            allAns.push(z.getAttribute('data-ans'));
            clearZoneEl(z);
        });
        var b = document.getElementById('wordBank');
        b.innerHTML = '';
        allAns.sort(function() { return Math.random() - 0.5; });
        allAns.forEach(function(w) { addToBank(w); });
    }

    function chAn() {
        if (!isR) return;
        var allCorrect = true;
        document.querySelectorAll('.drop-zone-inline').forEach(function(z) {
            var ans = z.getAttribute('data-ans');
            var cur = getZoneVal(z);
            if (cur === ans) {
                z.classList.add('correct'); z.classList.remove('wrong');
            } else {
                z.classList.add('wrong'); z.classList.remove('correct');
                allCorrect = false;
                if (cur !== '') { addToBank(cur); clearZoneEl(z); }
            }
        });
        if (allCorrect) {
            clearInterval(tI); isR = false;
            var elapsed = Date.now() - sT;
            if (bestTime === null || elapsed < bestTime) {
                bestTime = elapsed;
                document.getElementById('recordDisplay').innerText = '🏆 ベスト: ' + fmtTime(bestTime);
            }
            startCnf();
        } else {
            var wbc = document.querySelector('.word-bank-container');
            wbc.classList.remove('shake');
            void wbc.offsetWidth;
            wbc.classList.add('shake');
            setTimeout(function() { wbc.classList.remove('shake'); }, 500);
        }
    }

    function shMo() {
        clearInterval(tI); isR = false; sW = null;
        document.querySelectorAll('.drop-zone-inline').forEach(function(z) {
            setZone(z, z.getAttribute('data-ans'));
            z.classList.remove('correct', 'wrong');
        });
        document.getElementById('wordBank').innerHTML = '<span style="color:#888;font-size:0.9em;">お手本表示中。「チャレンジ開始」で練習できます。</span>';
        document.getElementById('timerDisplay').innerText = '00:00.0';
    }

    var cvs = document.getElementById("confetti-canvas");
    var ctx2 = cvs.getContext("2d");
    var pts = [], cnfRunning = false;
    function startCnf() {
        cvs.width = window.innerWidth; cvs.height = window.innerHeight; pts = [];
        for (var i = 0; i < 180; i++) pts.push({
            x: Math.random()*cvs.width, y: Math.random()*cvs.height - cvs.height,
            s: Math.random()*9+4, c: 'hsl('+Math.floor(Math.random()*360)+',75%,65%)', sp: Math.random()*3+2
        });
        cnfRunning = true; updateCnf();
        setTimeout(function() { cnfRunning = false; ctx2.clearRect(0,0,cvs.width,cvs.height); pts=[]; }, 4000);
    }
    function updateCnf() {
        if (!cnfRunning) return;
        ctx2.clearRect(0,0,cvs.width,cvs.height);
        pts.forEach(function(p) { p.y+=p.sp; ctx2.fillStyle=p.c; ctx2.fillRect(p.x,p.y,p.s,p.s); if(p.y>cvs.height)p.y=-20; });
        requestAnimationFrame(updateCnf);
    }

    shMo();
</script>

            <span id="reviewIcon">☆</span><span id="reviewText">復習リストに追加</span>

    <script>
    function toggleReview() {
        var key = 'hirei6';
        try {
            var data = JSON.parse(localStorage.getItem('study_' + key) || '{"count":0,"review":false}');
            data.review = !data.review;
            localStorage.setItem('study_' + key, JSON.stringify(data));
            updateReviewBtn(data.review);
        } catch(e) {}
    }
    function updateReviewBtn(isReview) {
        document.getElementById('reviewIcon').innerText = isReview ? '★' : '☆';
        document.getElementById('reviewText').innerText = isReview ? '復習リストに追加済み' : '復習リストに追加';
        document.getElementById('reviewBtn').style.background = isReview ? '#e74c3c' : '#f39c12';
    }
    (function() {
        var key = 'hirei6';
        try {
            var data = JSON.parse(localStorage.getItem('study_' + key) || '{"count":0,"review":false}');
            updateReviewBtn(data.review || false);
        } catch(e) {}
    })();
    </script>
